<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- InfraLearn 192px Android home-screen icon. Same diamond emblem as the
       master, redrawn at 192-unit grid so stroke widths read clearly at
       Android launcher size. Corner radius scales with the square. -->
  <rect width="192" height="192" rx="36" fill="#0B0A08"/>
  <g>
    <!-- Outer faint diamond -->
    <path d="M96 36 L156 96 L96 156 L36 96 Z" fill="#F5B842" opacity="0.18"/>
    <!-- Middle outlined diamond -->
    <path d="M96 54 L138 96 L96 138 L54 96 Z" fill="none" stroke="#F5B842" stroke-width="3"/>
    <!-- Solid inner glyph -->
    <path d="M96 78 L114 96 L96 114 L78 96 Z" fill="#F5B842"/>
    <!-- Brand dot — matches the "." in InfraLearn wordmark -->
    <circle cx="138" cy="138" r="6" fill="#F5B842"/>
  </g>
</svg>
