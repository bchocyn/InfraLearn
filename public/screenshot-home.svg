<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <!-- "Fake" mobile screenshot for the manifest. iPhone 13/14 logical size
       (390×844 @ 1x). Renders as a clean, branded preview when browsers
       (Chrome Android, Edge) show install dialogs. Pure SVG — no fonts
       required at install time, every glyph is geometry. -->
  <rect width="390" height="844" fill="#0B0A08"/>

  <!-- Top kicker + heading + streak chip -->
  <text x="20" y="60" fill="#F5B842" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.2">
    WELCOME BACK, ADA
  </text>
  <text x="20" y="100" fill="#F5F0E8" font-family="Georgia, serif" font-size="36" font-weight="700">
    InfraLearn<tspan fill="#F5B842">.</tspan>
  </text>
  <text x="20" y="124" fill="#9A938A" font-family="ui-sans-serif, sans-serif" font-size="13">
    DevOps fundamentals to MLOps in production.
  </text>
  <!-- Streak chip top-right -->
  <rect x="300" y="40" width="70" height="58" rx="10" fill="none" stroke="#3a3530"/>
  <text x="335" y="68" fill="#F5F0E8" font-family="Georgia, serif" font-size="20" font-weight="700" text-anchor="middle">14</text>
  <text x="335" y="86" fill="#9A938A" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">DAY STREAK</text>

  <!-- Companion card -->
  <rect x="16" y="160" width="358" height="78" rx="12" fill="#16130f" stroke="#3a3530"/>
  <circle cx="60" cy="199" r="22" fill="#F5B842" opacity="0.25"/>
  <path d="M60 184 L75 199 L60 214 L45 199 Z" fill="#F5B842"/>
  <text x="100" y="195" fill="#F5F0E8" font-family="Georgia, serif" font-size="16" font-weight="600">Hatchling Dragon</text>
  <text x="100" y="215" fill="#9A938A" font-family="ui-monospace, monospace" font-size="9" letter-spacing="1">TIER 1 · FIRE</text>

  <!-- Path progress card -->
  <rect x="16" y="258" width="358" height="120" rx="12" fill="#16130f" stroke="#F5B842" stroke-opacity="0.3"/>
  <text x="32" y="284" fill="#F5B842" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.2">YOUR PATH · DEVOPS</text>
  <text x="32" y="316" fill="#F5F0E8" font-family="Georgia, serif" font-size="18" font-weight="600">8 / 24 · 33%</text>
  <!-- Progress bar -->
  <rect x="32" y="332" width="326" height="6" rx="3" fill="#3a3530"/>
  <rect x="32" y="332" width="108" height="6" rx="3" fill="#F5B842"/>
  <text x="32" y="362" fill="#F5F0E8" font-family="ui-sans-serif, sans-serif" font-size="13" font-weight="600">Continue: CI pipelines</text>

  <!-- Daily practice card -->
  <rect x="16" y="398" width="358" height="160" rx="12" fill="#16130f" stroke="#3a3530"/>
  <text x="32" y="424" fill="#F5B842" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.2">DAILY PRACTICE</text>
  <text x="32" y="456" fill="#F5F0E8" font-family="ui-sans-serif, sans-serif" font-size="14" font-weight="500">Which YAML key sets a container image?</text>
  <!-- Choices -->
  <rect x="32" y="474" width="326" height="34" rx="6" fill="#0B0A08" stroke="#3a3530"/>
  <text x="48" y="495" fill="#F5F0E8" font-family="ui-sans-serif, sans-serif" font-size="13">A. spec.containers[].image</text>
  <rect x="32" y="514" width="326" height="34" rx="6" fill="#0B0A08" stroke="#3a3530"/>
  <text x="48" y="535" fill="#9A938A" font-family="ui-sans-serif, sans-serif" font-size="13">B. metadata.image</text>

  <!-- Reviews due teaser -->
  <rect x="16" y="578" width="358" height="86" rx="12" fill="#16130f" stroke="#3a3530"/>
  <rect x="16" y="578" width="3" height="86" fill="#7AB8E0"/>
  <text x="32" y="604" fill="#7AB8E0" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.2">REVIEWS DUE</text>
  <text x="32" y="630" fill="#F5F0E8" font-family="Georgia, serif" font-size="16" font-weight="600">5 concepts due today</text>
  <text x="32" y="652" fill="#9A938A" font-family="ui-sans-serif, sans-serif" font-size="12">5 min · spaced-repetition keeps it stuck</text>

  <!-- Tab bar -->
  <rect x="0" y="764" width="390" height="80" fill="#0B0A08" stroke="#3a3530"/>
  <text x="50"  y="800" fill="#F5B842" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">HOME</text>
  <text x="130" y="800" fill="#9A938A" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">ROADMAP</text>
  <text x="210" y="800" fill="#9A938A" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">LIBRARY</text>
  <text x="290" y="800" fill="#9A938A" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">BEAST</text>
  <text x="360" y="800" fill="#9A938A" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">SETTINGS</text>
</svg>
