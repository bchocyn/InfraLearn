<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 32×32 favicon. At this size the master's multi-layered diamond +
       brand-dot becomes mush, so we drop the outer faint diamond and the
       dot. Just the outlined+filled diamond pair on a dark rounded square —
       reads as the same mark at a glance. -->
