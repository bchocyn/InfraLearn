<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- 16×16 favicon — tab-strip size. Strip everything except the solid
       inner diamond on a dark square. Outlined glyph at 16px aliases into
       a fuzzy blob; solid fill is the only thing that reads. -->
